services:
  opencode-proxy:
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: opencode
    ports:
      - "4000:4000"
    volumes:
      - ./opencode/config.yaml:/app/config.yaml
    env_file:
      - ./opencode/.env
    command: ["--config", "/app/config.yaml"]
    restart: unless-stopped

  zed-proxy:
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: zed
    ports:
      - "4001:4000"
    volumes:
      - ./zed/config.yaml:/app/config.yaml
    env_file:
      - ./zed/.env
    command: ["--config", "/app/config.yaml"]
    restart: unless-stopped
